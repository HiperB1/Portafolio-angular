<form class="contact-forulary">
    <div>
        <label for="name">nombre</label>
        <input [(ngModel)]="name" type="text" name="name">
    </div>

    <div>
        <label for="email">Correo</label>
        <input [(ngModel)]="email" type="email" name="email">
    </div>
    <div>
        <label for="message">Mensaje</label>
        <input [(ngModel)]="message" type="text" name="message">
    </div>


    <button type="submit" (click)="sendData()">Enviar</button>
    <div>
        <input type="checkbox">
        <label for="">Empresa</label>
    </div>
    <div>
        <input type="checkbox">
        <label for="">Persona</label>
    </div>
</form>
